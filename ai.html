<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<div class="d-flex justify-content-center mt-4">
    <a class="btn btn-primary text-uppercase" href="index.html">
        ← Back to Main Page
    </a>
</div>
<style>
    body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #89f7fe, #66a6ff);
        text-align: center;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        color: white;
        margin-top: 30px;
        font-size: 40px;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
    }

    /* Back button */
    .d-flex {
        margin-top: 20px;
    }

    .btn {
        background: white;
        color: #333;
        padding: 10px 18px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: 0.2s;
    }

    .btn:hover {
        transform: scale(1.05);
        background: #f1f1f1;
    }

    /* Game board container */
    #board {
        display: grid;
        grid-template-columns: repeat(3, 110px);
        gap: 12px;
        margin-top: 30px;
        padding: 20px;
        background: rgba(255,255,255,0.15);
        border-radius: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    /* Cells */
    .cell {
        width: 110px;
        height: 110px;
        background: white;
        border-radius: 15px;
        font-size: 2.5em;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .cell:hover {
        transform: scale(1.08);
        background: #f0f0f0;
    }

    /* X and O colors */
    .cell:contains("X") {
        color: #ff4d6d;
    }

    .cell:contains("O") {
        color: #4dd2ff;
    }

    /* Status text */
    #status {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
        color: white;
        text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    }

    /* Restart button */
    button {
        margin-top: 15px;
        padding: 12px 25px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: white;
        font-weight: bold;
        transition: 0.2s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button:hover {
        transform: scale(1.05);
        background: #f1f1f1;
    }
</style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div id="board"></div>
<div id="status">Your turn!</div>
<button onclick="resetGame()">Restart Game</button>

<script>
    const board = document.getElementById("board");
    const statusText = document.getElementById("status");

    let cells = [];
    let gameState = ["", "", "", "", "", "", "", "", ""];
    let gameActive = true;

    const player = "X";
    const computer = "O";

    const winningConditions = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];

    function createBoard() {
        board.innerHTML = "";
        cells = [];

        for (let i = 0; i < 9; i++) {
            const cell = document.createElement("div");
            cell.classList.add("cell");
            cell.dataset.index = i;
            cell.addEventListener("click", handleCellClick);
            board.appendChild(cell);
            cells.push(cell);
        }
    }

    function handleCellClick(e) {
        const index = e.target.dataset.index;

        if (gameState[index] !== "" || !gameActive) return;

        makeMove(index, player);

        if (checkResult()) return;

        statusText.textContent = "Computer's turn...";
        setTimeout(computerMove, 500);
    }

    function makeMove(index, currentPlayer) {
        gameState[index] = currentPlayer;
        cells[index].textContent = currentPlayer;
    }

    function computerMove() {
    let emptyCells = gameState
        .map((val, idx) => val === "" ? idx : null)
        .filter(val => val !== null);

    // 1. 70% chance: try to win or block
    if (Math.random() < 0.7) {

        // Try to win
        for (let condition of winningConditions) {
            const [a, b, c] = condition;
            let values = [gameState[a], gameState[b], gameState[c]];

            if (values.filter(v => v === computer).length === 2 &&
                values.includes("")) {
                let moveIndex = condition[values.indexOf("")];
                makeMove(moveIndex, computer);
                checkResult();
                return;
            }
        }

        // Block player
        for (let condition of winningConditions) {
            const [a, b, c] = condition;
            let values = [gameState[a], gameState[b], gameState[c]];

            if (values.filter(v => v === player).length === 2 &&
                values.includes("")) {
                let moveIndex = condition[values.indexOf("")];
                makeMove(moveIndex, computer);
                checkResult();
                return;
            }
        }
    }

    // 2. Otherwise play dumb/random (lets you win sometimes)
    let move = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    makeMove(move, computer);
    checkResult();
}

    function checkResult() {
    let roundWon = false;
    let winner = null;

    for (let condition of winningConditions) {
        const [a, b, c] = condition;

        if (
            gameState[a] &&
            gameState[a] === gameState[b] &&
            gameState[a] === gameState[c]
        ) {
            roundWon = true;
            winner = gameState[a]; // X or O
            break;
        }
    }

    if (roundWon) {
        gameActive = false;

        if (winner === player) {
            statusText.textContent = "You win!";
        } else {
            statusText.textContent = "Computer wins!";
        }

        return true;
    }

    if (!gameState.includes("")) {
        statusText.textContent = "It's a draw!";
        gameActive = false;
        return true;
    }

    return false;
}

    function resetGame() {
        gameState = ["", "", "", "", "", "", "", "", ""];
        gameActive = true;
        statusText.textContent = "Your turn!";
        createBoard();
    }

    createBoard();
</script>

</body>
</html>
